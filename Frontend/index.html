<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Segmentation Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
          <h1>Image Segmentation Dashboard</h1>
          <p>Upload an image and visualize advanced segmentation results.</p>
        </header>
        <main class="dashboard-main">
          <form id="upload-form" enctype="multipart/form-data" class="styled-form">
            <label for="image" class="custom-file-upload">
              <span>Select Image</span>
              <input type="file" id="image" name="image" accept="image/*" required>
            </label>
            <button type="submit" class="segment-btn">
              <span>Segment Image</span>
              <span class="btn-animate"></span>
            </button>
            <div id="loading-spinner" style="display:none; margin-top:10px;">
              <div class="spinner"></div>
            </div>
            <div id="progress-container" style="display:none; text-align:center; margin-top:10px;">
              <div id="progress-bar" style="width:0%; height:10px; background:#ff512f; border-radius:5px; transition:width 0.3s;"></div>
              <p id="progress-text" style="margin-top:5px; color:#333;">Processing 0%</p>
            </div>
          </form>
          <h3 id="status-message" style="display:none;">Segmentation Completed Successfully ✅</h3>
          <section id="output-section" class="results-section">
            <h3>Segmentation Output</h3>
            <div class="image-pair">
              <div>
                <h4>Uploaded Image</h4>
                <img id="preview" src="" alt="Image Preview" class="dashboard-img">
              </div>
              <div>
                <h4>Average-Color Segmentation</h4>
                <img id="smooth" src="" alt="Smooth Segmented Image" class="dashboard-img">
              </div>
              <div>
                <h4>Random-Color Segmentation</h4>
                <img id="random" src="" alt="Random Segmented Image" class="dashboard-img">
              </div>
            </div>
          </section>
        </main>
      </div>

    <script src="script.js"></script>
</body>
</html>
